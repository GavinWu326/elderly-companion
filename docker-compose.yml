version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/elderly-companion.db
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped
